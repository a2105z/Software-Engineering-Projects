<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="GraphForge — A modern TI-84 inspired graphing calculator. Clean, Desmos-like, in your browser.">
  <title>GraphForge — Graphing Calculator</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="logo">GraphForge</h1>
      <div class="header-controls">
        <button id="angleMode" class="mode-btn" title="Switch RAD/DEG">RAD</button>
        <button id="windowBtn" class="mode-btn" title="Window settings">Window</button>
        <button id="zoomFit" class="mode-btn" title="Fit to standard view">Zoom Std</button>
      </div>
    </header>

    <main class="main">
      <!-- Graphing area -->
      <section class="graph-section">
        <canvas id="graphCanvas"></canvas>
        <div id="traceTooltip" class="trace-tooltip hidden"></div>
        <div id="coordDisplay" class="coord-display"></div>
      </section>

      <!-- Function list (Desmos-style) -->
      <section class="functions-section">
        <h3 class="section-title">Functions</h3>
        <div id="functionList" class="function-list">
          <div class="function-row" data-index="0">
            <span class="func-label">y₁</span>
            <input type="text" class="func-input" placeholder="e.g. x^2 or sin(x)" data-index="0">
          </div>
          <div class="function-row" data-index="1">
            <span class="func-label">y₂</span>
            <input type="text" class="func-input" placeholder="e.g. 2x + 1" data-index="1">
          </div>
          <div class="function-row" data-index="2">
            <span class="func-label">y₃</span>
            <input type="text" class="func-input" placeholder="e.g. cos(x)" data-index="2">
          </div>
          <div class="function-row" data-index="3">
            <span class="func-label">y₄</span>
            <input type="text" class="func-input" placeholder="e.g. sqrt(x)" data-index="3">
          </div>
        </div>
      </section>

      <!-- Calculator panel (TI-84 inspired) -->
      <section class="calc-section">
        <div class="display-panel">
          <div id="exprDisplay" class="expr-display"></div>
          <div id="resultDisplay" class="result-display">0</div>
        </div>

        <div class="keypad">
          <button class="btn btn-fn" data-action="clear">Clear</button>
          <button class="btn btn-fn" data-action="del">Del</button>
          <button class="btn btn-op" data-action="(">(</button>
          <button class="btn btn-op" data-action=")">)</button>
          <button class="btn btn-sci" data-action="sin(">sin</button>

          <button class="btn btn-num" data-action="7">7</button>
          <button class="btn btn-num" data-action="8">8</button>
          <button class="btn btn-num" data-action="9">9</button>
          <button class="btn btn-op" data-action="/">÷</button>
          <button class="btn btn-sci" data-action="cos(">cos</button>

          <button class="btn btn-num" data-action="4">4</button>
          <button class="btn btn-num" data-action="5">5</button>
          <button class="btn btn-num" data-action="6">6</button>
          <button class="btn btn-op" data-action="*">×</button>
          <button class="btn btn-sci" data-action="tan(">tan</button>

          <button class="btn btn-num" data-action="1">1</button>
          <button class="btn btn-num" data-action="2">2</button>
          <button class="btn btn-num" data-action="3">3</button>
          <button class="btn btn-op" data-action="-">−</button>
          <button class="btn btn-sci" data-action="log(">log</button>

          <button class="btn btn-num" data-action="0">0</button>
          <button class="btn btn-num" data-action=".">.</button>
          <button class="btn btn-op" data-action="^">^</button>
          <button class="btn btn-op" data-action="+">+</button>
          <button class="btn btn-sci" data-action="ln(">ln</button>

          <button class="btn btn-sci" data-action="sqrt(">√</button>
          <button class="btn btn-sci" data-action="abs(">abs</button>
          <button class="btn btn-sci" data-action="x">x</button>
          <button class="btn btn-sci" data-action="exp(">exp</button>
          <button class="btn btn-sci" data-action="**2">x²</button>

          <button class="btn btn-const" data-action="pi">π</button>
          <button class="btn btn-const" data-action="e">e</button>
          <button class="btn btn-special" data-action="ans">Ans</button>
          <button class="btn btn-equals" data-action="enter">Enter</button>
        </div>
      </section>
    </main>

    <!-- Window settings modal -->
    <div id="windowModal" class="modal hidden">
      <div class="modal-content">
        <h2>Window Settings</h2>
        <div class="window-inputs">
          <label>Xmin <input type="number" id="xMin" step="any" value="-10"></label>
          <label>Xmax <input type="number" id="xMax" step="any" value="10"></label>
          <label>Ymin <input type="number" id="yMin" step="any" value="-10"></label>
          <label>Ymax <input type="number" id="yMax" step="any" value="10"></label>
        </div>
        <div class="modal-actions">
          <button id="windowApply" class="btn btn-primary">Apply</button>
          <button id="windowClose" class="btn">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
